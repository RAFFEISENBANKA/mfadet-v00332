<!-- 1. CHAT BUBBLE (Bottom Right) -->
<div id="chatBubble" class="fixed bottom-8 right-8 z-[100] cursor-pointer group">
    <div class="absolute -top-2 -right-1 bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full animate-bounce shadow-lg">1</div>
    <div class="bg-[#003399] p-4 rounded-full shadow-2xl hover:scale-110 transition-transform border-4 border-white">
        <span class="text-3xl">💬</span>
    </div>
</div>

<!-- 2. AUTO-POPUP CHAT WINDOW -->
<div id="chatWindow" class="hidden fixed bottom-28 right-8 w-80 bg-white rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] z-[100] overflow-hidden border border-slate-200">
    <div class="bg-[#003399] p-4 text-white flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="relative">
                <span class="text-2xl">👨‍💼</span>
                <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#003399] rounded-full"></span>
            </div>
            <div>
                <p class="text-[10px] font-black uppercase tracking-widest">Agent Sanchez</p>
                <p class="text-[8px] opacity-80 uppercase">Financial Unit (CCIP)</p>
            </div>
        </div>
        <button onclick="document.getElementById('chatWindow').classList.add('hidden')" class="text-white/50 hover:text-white">✕</button>
    </div>
    
    <div class="h-64 p-4 overflow-y-auto bg-slate-50 space-y-4">
        <!-- SYSTEM MESSAGE -->
        <div class="flex flex-col items-start">
            <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 max-w-[85%]">
                <p class="text-[11px] text-slate-700 leading-relaxed">
                    Hello <span class="font-bold text-[#003399]">DETLEV STANG</span>. Your file <span class="font-bold">#V00332</span> is currently being processed. 
                    <br><br>
                    To finalize the release of <span class="text-green-600 font-bold">€ 39,562.25</span>, please confirm if you have completed the mandatory deposit.
                </p>
            </div>
            <span class="text-[8px] text-slate-400 mt-1 ml-1">Delivered 12:44 PM</span>
        </div>
    </div>

    <div class="p-3 border-t bg-white">
        <input type="text" placeholder="Type your message..." class="w-full p-3 text-[11px] bg-slate-100 rounded-lg outline-none focus:ring-1 focus:ring-[#003399]">
    </div>
</div>

<!-- 3. ADD THIS SCRIPT TO THE BOTTOM OF YOUR BODY -->
<script>
    // Logic to toggle chat
    document.getElementById('chatBubble').addEventListener('click', function() {
        document.getElementById('chatWindow').classList.toggle('hidden');
    });

    // Auto-open chat after 3 seconds for engagement
    setTimeout(() => {
        document.getElementById('chatWindow').classList.remove('hidden');
    }, 3000);
</script>
